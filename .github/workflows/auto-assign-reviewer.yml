name: Auto-assign peer reviewer

# Keep this workflow disabled while automatic peer review assignment is paused.
on:
  workflow_dispatch:

permissions:
  contents: read
  issues: write
  pull-requests: write

jobs:
  pick-peer-reviewer:
    runs-on: ubuntu-latest
    if: ${{ false }}
    steps:
      - name: Checkout base branch profiles
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Pick a random classmate and post a review request
        uses: actions/github-script@f28e40c7f34bde8b3046d885e986cb6290c5673b # v7
        with:
          script: |
            const fs = require('fs');
            const path = require('path');

            const profilesDir = path.join(process.env.GITHUB_WORKSPACE, 'data', 'profiles');
            const pr = context.payload.pull_request;
            const author = String(pr.user.login || '').toLowerCase();
            const marker = '<!-- open-source-pulse-wall:auto-peer-reviewer -->';

            const labels = new Set((pr.labels || []).map((label) => String(label.name || '').toLowerCase()));
            if (labels.has('peer-review-suggested')) {
              core.info('Peer reviewer was already suggested on this PR.');
              return;
            }

            const comments = await github.paginate(github.rest.issues.listComments, {
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: pr.number,
              per_page: 100
            });

            if (comments.some((comment) => String(comment.body || '').includes(marker))) {
              core.info('Existing auto peer-reviewer comment found; skipping duplicate comment.');
              return;
            }

            let peers = [];
            try {
              const files = fs.readdirSync(profilesDir)
                .filter((f) => f.endsWith('.json') && !f.startsWith('_'));

              for (const file of files) {
                try {
                  const data = JSON.parse(fs.readFileSync(path.join(profilesDir, file), 'utf8'));
                  if (data && typeof data.github === 'string' && data.github.trim()) {
                    peers.push(data.github.trim());
                  }
                } catch (parseError) {
                  core.info(`Skipping unparseable profile ${file}: ${parseError.message}`);
                }
              }
            } catch (readError) {
              core.info(`Profiles directory unreadable, skipping: ${readError.message}`);
              return;
            }

            const eligible = peers.filter((handle) => handle.toLowerCase() !== author);

            if (!eligible.length) {
              core.info('No eligible peer reviewers found (only PR author exists or directory empty).');
              return;
            }

            const picked = eligible[Math.floor(Math.random() * eligible.length)];

            const body = [
              marker,
              `:wave: 课堂自动指派同学互评：@${picked}`,
              ``,
              `麻烦帮 @${pr.user.login} 看一下这个 PR，留一条 review 评论或者一句 LGTM 就算完成今天的同学互评任务。`,
              ``,
              `> 老师已经被 CODEOWNERS 自动指派为 reviewer，所以你不需要顾虑「会不会和老师重复」。`,
              `> 如果你最近太忙，欢迎在评论里手动 @ 另一位同学接力。`
            ].join('\n');

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: pr.number,
              body
            });

            try {
              await github.rest.issues.addLabels({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: pr.number,
                labels: ['peer-review-suggested']
              });
            } catch (labelError) {
              core.info(`Could not add peer-review-suggested label: ${labelError.message}`);
            }

            core.notice(`Picked classmate reviewer: @${picked}`);
